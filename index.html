<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IT Asset Registry</title>

  <!-- Tailwind CSS v4 CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts: IBM Plex Sans Thai + IBM Plex Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Sarabun:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <style>
    :root {
      --navy: #0d1b2a;
      --navy-light: #1b2d42;
      --navy-border: #263c54;
      --accent: #3b82f6;
      --accent-dim: #1d4ed8;
      --surface: #f8fafc;
      --surface-2: #f1f5f9;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --border: #e2e8f0;
      --danger: #ef4444;
      --warning: #f97316;
      --caution: #eab308;
      --ok: #22c55e;
      --sidebar-w: 260px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Sarabun', 'IBM Plex Sans Thai', sans-serif;
      background: var(--surface);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Sidebar ─────────────────────────────────── */
    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--sidebar-w);
      height: 100vh;
      background: var(--navy);
      display: flex;
      flex-direction: column;
      z-index: 100;
      transition: transform .3s ease;
      overflow-y: auto;
    }

    #sidebar::-webkit-scrollbar {
      width: 4px;
    }

    #sidebar::-webkit-scrollbar-track {
      background: transparent;
    }

    #sidebar::-webkit-scrollbar-thumb {
      background: var(--navy-border);
      border-radius: 2px;
    }

    .sidebar-logo {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--navy-border);
    }

    .sidebar-logo .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }

    .sidebar-logo h1 {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      letter-spacing: .5px;
      line-height: 1.3;
      margin: 0;
    }

    .sidebar-logo span {
      font-size: 11px;
      color: #64748b;
      font-family: 'IBM Plex Mono', monospace;
    }

    .sidebar-section {
      padding: 16px 12px 8px;
    }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 600;
      color: #475569;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 0 8px;
      margin-bottom: 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      color: #94a3b8;
      font-size: 13.5px;
      font-weight: 500;
      transition: all .15s ease;
      user-select: none;
      text-decoration: none;
      margin-bottom: 2px;
    }

    .nav-item:hover {
      background: var(--navy-light);
      color: #cbd5e1;
    }

    .nav-item.active {
      background: var(--accent);
      color: #fff;
    }

    .nav-item.active svg {
      color: #fff;
    }

    .nav-item svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .nav-item .nav-badge {
      margin-left: auto;
      background: #ef4444;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 10px;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 12px;
      border-top: 1px solid var(--navy-border);
    }

    .user-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      background: var(--navy-light);
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .user-chip .user-name {
      font-size: 12px;
      font-weight: 600;
      color: #cbd5e1;
    }

    .user-chip .user-role {
      font-size: 10px;
      color: #64748b;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .admin-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ok);
    }

    /* ── Main Content ────────────────────────────── */
    #main {
      margin-left: var(--sidebar-w);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Topbar ──────────────────────────────────── */
    #topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(248, 250, 252, .95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 12px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #menu-toggle {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-main);
      padding: 4px;
    }

    .topbar-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-main);
    }

    .topbar-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: 4px;
    }

    .topbar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Page Content ────────────────────────────── */
    #page-content {
      flex: 1;
      padding: 28px;
      max-width: 1400px;
    }

    /* ── Cards & Surfaces ────────────────────────── */
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .05);
    }

    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-header h2 {
      font-size: 14px;
      font-weight: 700;
      margin: 0;
      color: var(--text-main);
    }

    .card-header .card-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: auto;
    }

    .card-body {
      padding: 20px;
    }

    /* ── Stat Cards ──────────────────────────────── */
    .stat-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      overflow: hidden;
      transition: box-shadow .2s;
    }

    .stat-card:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, .08);
    }

    .stat-card .stat-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }

    .stat-card .stat-val {
      font-size: 32px;
      font-weight: 700;
      font-family: 'IBM Plex Mono', monospace;
      line-height: 1;
    }

    .stat-card .stat-label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .stat-card .stat-stripe {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      border-radius: 0 12px 12px 0;
    }

    /* ── Badges / Risk Chips ─────────────────────── */
    .risk-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 11.5px;
      font-weight: 600;
    }

    .risk-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .status-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 99px;
      font-size: 11.5px;
      font-weight: 600;
    }

    .status-active {
      background: #dcfce7;
      color: #166534;
    }

    .status-repair {
      background: #fef9c3;
      color: #854d0e;
    }

    .status-retired {
      background: #fee2e2;
      color: #991b1b;
    }

    .status-standby {
      background: #e0e7ff;
      color: #3730a3;
    }

    .nt-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 99px;
      background: #eff6ff;
      color: #1d4ed8;
      font-size: 11px;
      font-weight: 600;
    }

    /* ── Table ───────────────────────────────────── */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .data-table thead tr {
      background: var(--surface-2);
      border-bottom: 2px solid var(--border);
    }

    .data-table th {
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .data-table td {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    .data-table tbody tr {
      transition: background .1s;
      cursor: pointer;
    }

    .data-table tbody tr:hover {
      background: var(--surface-2);
    }

    .data-table tbody tr:last-child td {
      border-bottom: none;
    }

    .asset-name-cell {
      font-weight: 600;
      color: var(--text-main);
    }

    .asset-id-cell {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11.5px;
      color: var(--text-muted);
    }

    .ip-cell {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
    }

    /* ── Search / Filter Bar ─────────────────────── */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 340px;
    }

    .search-wrap svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 15px;
      height: 15px;
      color: var(--text-light);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 8px 12px 8px 34px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      background: #fff;
      outline: none;
      transition: border-color .15s;
    }

    .search-input:focus {
      border-color: var(--accent);
    }

    .filter-select {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      background: #fff;
      outline: none;
      cursor: pointer;
      color: var(--text-main);
    }

    .filter-select:focus {
      border-color: var(--accent);
    }

    /* ── Buttons ─────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: all .15s;
      white-space: nowrap;
    }

    .btn svg {
      width: 14px;
      height: 14px;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-dim);
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      background: var(--surface-2);
      color: var(--text-main);
    }

    .btn-sm {
      padding: 5px 10px;
      font-size: 12px;
    }

    .btn-icon {
      width: 32px;
      height: 32px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 7px;
    }

    /* ── Tabs ────────────────────────────────────── */
    .tab-bar {
      display: flex;
      gap: 2px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 20px;
    }

    .tab-btn {
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tab-btn:hover {
      color: var(--text-main);
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-btn svg {
      width: 14px;
      height: 14px;
    }

    .tab-pane {
      display: none;
    }

    .tab-pane.active {
      display: block;
    }

    /* ── Modal ───────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0, 0, 0, .5);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal-box {
      background: #fff;
      border-radius: 16px;
      width: 100%;
      max-width: 780px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, .2);
      transform: translateY(-20px);
      transition: transform .2s;
      margin: auto;
    }

    .modal-overlay.open .modal-box {
      transform: translateY(0);
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .modal-header h2 {
      font-size: 16px;
      font-weight: 700;
      margin: 0;
      flex: 1;
    }

    .modal-body {
      padding: 24px;
    }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    /* ── Form ────────────────────────────────────── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
    }

    .form-full {
      grid-column: 1 / -1;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: .3px;
    }

    .form-label .req {
      color: var(--danger);
      margin-left: 2px;
    }

    .form-control {
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text-main);
      background: #fff;
      outline: none;
      transition: border-color .15s;
      width: 100%;
    }

    .form-control:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, .1);
    }

    textarea.form-control {
      resize: vertical;
      min-height: 80px;
    }

    .form-section-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 4px 0;
      margin-top: 8px;
      border-bottom: 1px solid #dbeafe;
      grid-column: 1 / -1;
    }

    /* ── Detail Panel (Slide-in) ─────────────────── */
    #detail-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 600px;
      height: 100vh;
      background: #fff;
      box-shadow: -8px 0 32px rgba(0, 0, 0, .12);
      z-index: 150;
      transform: translateX(100%);
      transition: transform .3s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #detail-panel.open {
      transform: translateX(0);
    }

    .panel-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .panel-header-info {
      flex: 1;
      min-width: 0;
    }

    .panel-header-info h2 {
      font-size: 17px;
      font-weight: 700;
      margin: 0 0 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .panel-header-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    #panel-overlay {
      position: fixed;
      inset: 0;
      z-index: 140;
      background: rgba(0, 0, 0, .3);
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }

    #panel-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    /* ── Info Grid ───────────────────────────────── */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .info-item {}

    .info-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-light);
      text-transform: uppercase;
      letter-spacing: .4px;
      margin-bottom: 3px;
    }

    .info-value {
      font-size: 13.5px;
      color: var(--text-main);
      font-weight: 500;
    }

    .info-value.mono {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12.5px;
    }

    .info-value.empty {
      color: var(--text-light);
      font-style: italic;
      font-weight: 400;
    }

    /* ── Risk Matrix Cards ───────────────────────── */
    .risk-group-card {
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .risk-group-header {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .risk-group-header h3 {
      font-size: 13px;
      font-weight: 700;
      margin: 0;
      color: #fff;
    }

    .risk-group-body {
      background: #fff;
    }

    /* ── Toast ───────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .15);
      display: flex;
      align-items: center;
      gap: 8px;
      animation: slideUp .3s ease;
      max-width: 320px;
    }

    .toast-success {
      background: #16a34a;
    }

    .toast-error {
      background: var(--danger);
    }

    .toast-info {
      background: var(--accent);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Loading Spinner ─────────────────────────── */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .page-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 300px;
      gap: 12px;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ── Empty State ─────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      color: var(--text-light);
      margin: 0 auto 12px;
    }

    .empty-state h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 6px;
    }

    .empty-state p {
      font-size: 13px;
    }

    /* ── Divider ─────────────────────────────────── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }

    /* ── Confirm Dialog ──────────────────────────── */
    #confirm-modal .modal-box {
      max-width: 420px;
    }

    /* ── Admin Panel ─────────────────────────────── */
    .risk-level-row {
      display: grid;
      grid-template-columns: auto 1fr 1fr 80px 80px;
      gap: 10px;

  <script>
    // ── App State ──────────────────────────────────────────────
const App = {
  // injected from GAS doGet()
  userInfo:     <?= userInfo ?>,
  riskLevels:   <?= riskLevels ?>,
  assetTypes:   <?= assetTypes ?>,
  assetStatus:  <?= assetStatus ?>,
  accessLevels: <?= accessLevels ?>,
  version:      "<?= version ?>",

  // runtime state
  currentPage:  "dashboard",
  assets:       [],
  filteredAssets: [],
  dashboardData: null,
  editingAssetId: null,
  pendingDeleteId: null,
};

// ── GAS API Call ───────────────────────────────────────────
function gasCall(action, payload = {}) {
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(res => resolve(res))
      .withFailureHandler(err => reject(err))
      .routeAction(action, payload);
  });
}

// ── Init ───────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('app-version').textContent = App.version;
  initUserUI();
  loadRiskFilterOptions();
  navigate('dashboard');
  loadDashboard();
});

// ── User UI ────────────────────────────────────────────────
function initUserUI() {
  const u = App.userInfo;
  const nameEl = document.getElementById('user-name');
  const avatarEl = document.getElementById('user-avatar');
  const roleEl = document.getElementById('user-role-label');
  const dotEl = document.getElementById('role-dot');
  const adminSection = document.getElementById('admin-section');
  const topbarBadge = document.getElementById('topbar-admin-badge');
  const addBtn = document.getElementById('add-asset-btn-wrap');
  const panelActions = document.getElementById('panel-admin-actions');

  nameEl.textContent = u.name || 'ผู้เยี่ยมชม';
  avatarEl.textContent = (u.name || 'G').charAt(0).toUpperCase();

  if (u.isAdmin) {
    roleEl.textContent = 'Administrator';
    dotEl.style.background = '#22c55e';
    adminSection.style.display = 'block';
    topbarBadge.style.display = 'block';
    addBtn.style.display = 'block';
    panelActions.style.display = 'flex';
    avatarEl.style.background = '#16a34a';
  } else if (u.isLoggedIn) {
    roleEl.textContent = 'ผู้ใช้งาน';
    dotEl.style.background = '#3b82f6';
  }
}

// ── Navigation ─────────────────────────────────────────────
function navigate(page) {
  // hide all pages
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  // show target
  const target = document.getElementById('page-' + page);
  if (target) target.style.display = 'block';

  // update nav
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const activeNav = document.querySelector(`.nav-item[data-page="${page}"]`);
  if (activeNav) activeNav.classList.add('active');

  // update title
  const titles = {
    dashboard: 'Dashboard',
    assets:    'รายการทรัพย์สิน IT',
    network:   'อุปกรณ์เครือข่าย NT',
    risk:      'ภาพรวมความเสี่ยง',
    admin:     'ตั้งค่าระบบ',
    audit:     'Audit Log',
  };
  document.getElementById('page-title').textContent = titles[page] || page;
  App.currentPage = page;

  // lazy load
  if (page === 'assets' && App.assets.length === 0) loadAssets();
  if (page === 'network') loadNetwork();
  if (page === 'risk') loadRisk();
  if (page === 'admin' && App.userInfo.isAdmin) loadAdmin();
  if (page === 'audit' && App.userInfo.isAdmin) loadAudit();

  closeSidebar();
}

// ── Sidebar ────────────────────────────────────────────────
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');
  const isOpen = sb.classList.contains('open');
  if (isOpen) { sb.classList.remove('open'); ov.style.display = 'none'; }
  else        { sb.classList.add('open');    ov.style.display = 'block'; }
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').style.display = 'none';
}

// ── Toast ──────────────────────────────────────────────────
function showToast(msg, type = 'success') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  const icons = { success:'✓', error:'✕', info:'ℹ' };
  t.innerHTML = `<span>${icons[type]||'●'}</span> ${msg}`;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function openDeleteModal(assetId, assetName) {

  document.getElementById('confirm-message').textContent =
    `คุณต้องการลบอุปกรณ์ "${assetName}" (${assetId}) ออกจากระบบ\n\nเลือก "เปลี่ยนสถานะ" เพื่อ Soft Delete หรือ "ลบถาวร" เพื่อลบออกจาก Sheets ทั้งหมด`;

async function confirmSoftDelete() {
  if (!App.pendingDeleteId) return;
  try {
    const res = await gasCall('SOFT_DELETE_ASSET', { asset_id: App.pendingDeleteId });
    if (res.success) {
      showToast(res.message, 'success');
      closeConfirmModal(); closePanel();
      App.assets = []; loadAssets();
      if (App.currentPage === 'dashboard') loadDashboard();
    } else { showToast(res.message, 'error'); }
  } catch(e) { showToast('เกิดข้อผิดพลาด', 'error'); }
}
async function confirmHardDelete() {
  if (!App.pendingDeleteId) return;
  try {
    const res = await gasCall('HARD_DELETE_ASSET', { asset_id: App.pendingDeleteId });
    if (res.success) {
      showToast(res.message, 'success');
      closeConfirmModal(); closePanel();
      App.assets = []; loadAssets();
      if (App.currentPage === 'dashboard') loadDashboard();
    } else { showToast(res.message, 'error'); }
  } catch(e) { showToast('เกิดข้อผิดพลาด', 'error'); }
}

// DASHBOARD
// ══════════════════════════════════════════════════════════
async function loadDashboard() {
  const el = document.getElementById('dashboard-content');
  try {
    const res = await gasCall('GET_DASHBOARD');
    if (!res.success) { el.innerHTML = `<div class="empty-state"><p>${res.message}</p></div>`; return; }
    App.dashboardData = res.data;
    renderDashboard(res.data);

    // update critical badge
    const critical = (res.data.riskLevels || []).find(r => r.order >= (res.data.riskLevels.length));
    const criticalCount = critical ? (res.data.byRisk[critical.id] || 0) : 0;
    if (criticalCount > 0) {
      const badge = document.getElementById('critical-count');
      badge.textContent = criticalCount;
      badge.style.display = 'inline';
    }
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><p>โหลดข้อมูลล้มเหลว: ${e.message||e}</p></div>`;
  }
}

// ASSET LIST

async function loadAssets() {
  const el = document.getElementById('assets-table-wrap');
  el.innerHTML = `<div class="page-loading"><div class="spinner"></div></div>`;
  try {
    const res = await gasCall('GET_ASSET_LIST', {});
    if (!res.success) { showToast(res.message, 'error'); return; }
    App.assets = res.data.assets || [];
    App.filteredAssets = [...App.assets];
    document.getElementById('asset-count-label').textContent = `${App.assets.length} รายการ`;
    renderAssetsTable(App.filteredAssets);
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><p>โหลดล้มเหลว: ${e.message||e}</p></div>`;
  }
}

function filterAssets() {
  const q      = (document.getElementById('search-input').value||'').toLowerCase();
  const type   = document.getElementById('filter-type').value;
  const status = document.getElementById('filter-status').value;
  const risk   = document.getElementById('filter-risk').value;
  const ntOnly = document.getElementById('filter-nt').checked;

  App.filteredAssets = App.assets.filter(a => {
    if (type   && a.type !== type) return false;
    if (status && a.status !== status) return false;
    if (risk   && a.risk_level_id !== risk) return false;
    if (ntOnly && a.is_nt_device !== 'TRUE') return false;
    if (q && ![a.name,a.asset_id,a.ip_address,a.department,a.asset_number].some(v=>(v||'').toLowerCase().includes(q))) return false;
    return true;
  });

  renderAssetsTable(App.filteredAssets);
  document.getElementById('asset-count-label').textContent =
    `${App.filteredAssets.length} / ${App.assets.length} รายการ`;
}

function renderAssetsTable(assets) {
  const el = document.getElementById('assets-table-wrap');
  if (!assets.length) {
    el.innerHTML = `<div class="empty-state">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <h3>ไม่พบอุปกรณ์</h3><p>ลองปรับเงื่อนไขการค้นหา</p></div>`;
    return;
  }

  let html = `<div style="overflow-x:auto;"><table class="data-table"><thead><tr>
    <th>อุปกรณ์</th><th>ประเภท</th><th>IP Address</th>
    <th>ตำแหน่ง</th><th>ความเสี่ยง</th><th>สถานะ</th>`;
  if (App.userInfo.isAdmin) html += `<th></th>`;
  html += `</tr></thead><tbody>`;

  assets.forEach(a => {
    html += `<tr onclick="openPanel('${a.asset_id}')">
      <td>
        <div class="asset-name-cell">${a.name}
          ${a.is_nt_device === 'TRUE' ? `<span class="nt-badge" style="margin-left:6px">NT</span>` : ''}
        </div>
        <div class="asset-id-cell">${a.asset_id}</div>
      </td>
      <td>${typeIconHTML(a.type)} ${a.type}</td>
      <td class="ip-cell">${a.ip_address||'—'}</td>
      <td style="font-size:12px;color:var(--text-muted)">${a.location||'—'}</td>
      <td>${a.risk_level_id ? riskBadgeHTML(a.risk_level_id) : '<span style="color:var(--text-light);font-size:12px">—</span>'}</td>
      <td>${statusBadgeHTML(a.status)}</td>`;
    if (App.userInfo.isAdmin) {
      html += `<td onclick="event.stopPropagation()">
        <div style="display:flex;gap:4px;">
          <button class="btn btn-ghost btn-sm btn-icon" onclick="openAssetModal('${a.asset_id}')" title="แก้ไข">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="btn btn-ghost btn-sm btn-icon" onclick="openDeleteModal('${a.asset_id}','${a.name}')" title="ลบ" style="color:var(--danger)">
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </td>`;
    }
    html += `</tr>`;
  });

  html += `</tbody></table></div>`;
  el.innerHTML = html;
}

function renderRisk(assets) {
  const el = document.getElementById('risk-content');
  const byLevel = {};
  App.riskLevels.forEach(r => { byLevel[r.id] = []; });
  assets.forEach(a => {
    if (byLevel[a.risk_level_id]) byLevel[a.risk_level_id].push(a);
    else byLevel[''] = [...(byLevel['']||[]), a];
  });

  let html = `
  <div style="margin-bottom:20px;padding:16px 20px;background:#fff;border:1px solid var(--border);border-radius:12px;">
    <h3 style="margin:0 0 14px;font-size:14px;font-weight:700">สรุประดับความเสี่ยงทั้งหมด</h3>
    <div style="display:flex;flex-wrap:wrap;gap:10px;">
      ${App.riskLevels.map(r => {
        const count = (byLevel[r.id]||[]).length;
        return `<div style="flex:1;min-width:100px;background:${r.color}15;border:1px solid ${r.color}40;border-radius:10px;padding:14px;text-align:center;">
          <div style="font-size:28px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:${r.color}">${count}</div>
          <div style="font-size:12px;font-weight:600;color:${r.color}">${r.label}</div>
        </div>`;
      }).join('')}

  </div>`;

  App.riskLevels.slice().reverse().forEach(r => {
    const group = byLevel[r.id] || [];
    html += `
    <div class="card" style="margin-bottom:16px;border-top:4px solid ${r.color};">
      <div class="card-header">
        <span style="width:12px;height:12px;border-radius:50%;background:${r.color};flex-shrink:0"></span>
        <h2>ความเสี่ยง: ${r.label}</h2>
        <span class="card-sub">${group.length} อุปกรณ์</span>
      </div>`;
    if (group.length === 0) {
      html += `<div style="padding:16px 20px;font-size:13px;color:var(--text-light)">ไม่มีอุปกรณ์ในระดับนี้</div>`;
    } else {
      html += `<div style="overflow-x:auto;"><table class="data-table"><thead><tr>
        <th>อุปกรณ์</th><th>ประเภท</th><th>แผนก</th><th>IP</th><th>สถานะ</th>
      </tr></thead><tbody>`;
      group.forEach(a => {
        html += `<tr onclick="openPanel('${a.asset_id}')">
          <td><div class="asset-name-cell">${a.name}${a.is_nt_device==='TRUE'?` <span class="nt-badge">NT</span>`:''}</div><div class="asset-id-cell">${a.asset_id}</div></td>
          <td>${typeIconHTML(a.type)} ${a.type}</td>
          <td style="font-size:12px">${a.department||'—'}</td>
          <td class="ip-cell">${a.ip_address||'—'}</td>
          <td>${statusBadgeHTML(a.status)}</td>
        </tr>`;
      });
      html += `</tbody></table></div>`;
    }
    html += `</div>`;
  });

  el.innerHTML = html;
}

function updateRiskPreview(i) {
  const color = document.getElementById(`rl-color-${i}`).value;
  const label = document.getElementById(`rl-label-${i}`).value;
  document.getElementById(`rl-color-text-${i}`).value = color;
  const prev = document.getElementById(`rl-preview-${i}`);
  prev.style.background = color + '20';
  prev.style.color = color;
  prev.style.border = `1px solid ${color}40`;
  prev.querySelector('.risk-dot').style.background = color;
  prev.childNodes[prev.childNodes.length-1].textContent = label;
}

function syncColorInput(i) {
  const hex = document.getElementById(`rl-color-text-${i}`).value;
  if (/^#[0-9a-fA-F]{6}$/.test(hex)) {
    document.getElementById(`rl-color-${i}`).value = hex;
    updateRiskPreview(i);
  }
}

function addRiskLevel() {
  App.riskLevels.push({ id: 'level_' + Date.now(), label: 'ระดับใหม่', color: '#6366f1', textColor: '#fff', order: App.riskLevels.length + 1 });
  renderAdminPanel();
}

function removeRiskLevel(i) {
  App.riskLevels.splice(i, 1);
  renderAdminPanel();
}

async function saveRiskLevels() {
  const count = document.querySelectorAll('[id^="rl-label-"]').length;
  const levels = [];
  for (let i = 0; i < count; i++) {
    const label = document.getElementById(`rl-label-${i}`)?.value;
    const color = document.getElementById(`rl-color-${i}`)?.value;
    if (label && color) {
      levels.push({ id: App.riskLevels[i]?.id || ('level_'+i), label, color, textColor: '#fff', order: i+1 });
    }
  }
  try {
    const res = await gasCall('SAVE_RISK_LEVELS', { levels });
    if (res.success) {
      App.riskLevels = levels;
      showToast('บันทึก Risk Levels สำเร็จ', 'success');
      loadRiskFilterOptions();
    } else { showToast(res.message, 'error'); }
  } catch(e) { showToast('เกิดข้อผิดพลาด', 'error'); }
}

    <div style="overflow-x:auto;"><table class="data-table"><thead><tr>
      <th>เวลา</th><th>Action</th><th>อุปกรณ์</th><th>ผู้ทำรายการ</th>
    </tr></thead><tbody>`;
    logs.forEach(l => {
      const c = actionColors[l.action] || '#94a3b8';
      html += `<tr>
        <td style="font-size:11.5px;font-family:'IBM Plex Mono',monospace;color:var(--text-muted)">${l.timestamp}</td>
        <td><span style="background:${c}20;color:${c};border:1px solid ${c}40;padding:2px 8px;border-radius:99px;font-size:11.5px;font-weight:700">${actionLabel[l.action]||l.action}</span></td>
        <td>
          <div style="font-weight:600;font-size:13px">${l.asset_name}</div>
          <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text-muted)">${l.asset_id}</div>
        </td>
        <td style="font-size:12px;color:var(--text-muted)">${l.actor_email}</td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><p>โหลดล้มเหลว</p></div>`;
  }
}

function getFieldVal(id) {
  const el = document.getElementById(id);
  if (!el) return '';
  if (el.type === 'checkbox') return el.checked;
  return el.value;
}

async function saveAsset() {
  const name = getFieldVal('f-name');
  const type = getFieldVal('f-type');
  if (!name || !type) { showToast('กรุณากรอกชื่ออุปกรณ์และประเภท', 'error'); return; }

  const fields = [
    'name','type','asset_number','brand','model','serial_number',
    'mac_address','ip_address','location','department','purchase_date',
    'warranty_expire','status','description','responsibilities',
    'connected_systems','owner','role_notes','risk_level_id',
    'risk_description','impact_if_failed','cascading_impact',
    'windows_username','windows_password','access_level',
    'last_password_change','backup_plan','contingency_plan',
    'maintenance_schedule','responsible_person','plan_notes',
  ];

  const payload = {};
  fields.forEach(f => { payload[f] = getFieldVal('f-' + f); });
  payload.is_nt_device = getFieldVal('f-is_nt_device');

  const btn = document.getElementById('modal-save-btn');
  btn.disabled = true;
  btn.innerHTML = `<div class="spinner" style="width:14px;height:14px;border-width:2px;border-color:rgba(255,255,255,.3);border-top-color:#fff"></div> กำลังบันทึก...`;

  try {
    let res;
    if (App.editingAssetId) {
      payload.asset_id = App.editingAssetId;
      res = await gasCall('UPDATE_ASSET', payload);
    } else {
      res = await gasCall('CREATE_ASSET', payload);
    }

    if (res.success) {
      showToast(res.message, 'success');
      closeAssetModal();
      App.assets = [];
      loadAssets();
      if (App.currentPage === 'dashboard') loadDashboard();
      if (App.currentPage === 'network') loadNetwork();
      if (App.currentPage === 'risk') loadRisk();
    } else {
      showToast(res.message || 'เกิดข้อผิดพลาด', 'error');
    }
  } catch(e) {
    showToast('เกิดข้อผิดพลาด: ' + (e.message||e), 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> บันทึก`;
  }
}
